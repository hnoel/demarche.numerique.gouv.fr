---
name: Create and publish a Docker image

# Configures this workflow to run manually or every time a change is pushed to the branch called `master`.
on:
  workflow_dispatch: {}
  push:
    branches: ['main']

# Defines two custom environment variables for the workflow. These are used for the Container registry domain, and a name for the Docker image that this workflow builds.
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# There is a single job in this workflow. It's configured to run on the latest available version of Ubuntu.
jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    # Sets the permissions granted to the `GITHUB_TOKEN` for the actions in this job.
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    # required at step 19 ?
    services:
      postgres:
        image: postgis/postgis:17-3.5
        env:
          POSTGRES_USER: tps_development
          POSTGRES_DB: tps
          POSTGRES_PASSWORD: tps_development
        ports: [ "5432:5432" ]      #
    steps:
      - name: 'Checkout repo "https://github.com/demarche-numerique/demarche.numerique.gouv.fr"'
        uses: actions/checkout@v6
        with:
          repository: 'demarche-numerique/demarche.numerique.gouv.fr'
      - name: 'Checkout repo "https://github.com/hnoel/demarche.numerique.gouv.fr" into "./hnoel"'
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository }}
          path: './hnoel'
      - name: Merge checkout repositories
        run: cp -r ./hnoel/* ./ && mv ./env.example ./.env && rm -rf ./hnoel
        shell: bash
      - name: echo postgres container ip
        id: postgres_ip
        run: echo "POSTGRES=$(hostname -I | awk '{print $1}')" >> "$GITHUB_OUTPUT"
        # Uses the `docker/login-action` action to log in to the Container registry registry using the account and password that will publish the packages. Once published, the packages are scoped to the account defined here.
      - name: Log in to the Container registry
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # This step uses [docker/metadata-action](https://github.com/docker/metadata-action#about) to extract tags and labels that will be applied to the specified image. The `id` "meta" allows the output of this step to be referenced in a subsequent step. The `images` value provides the base name for the tags and labels.
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
      # This step uses the `docker/build-push-action` action to build the image, based on your repository's `Dockerfile`. If the build succeeds, it pushes the image to GitHub Packages.
      # It uses the `context` parameter to define the build's context as the set of files located in the specified path. For more information, see [Usage](https://github.com/docker/build-push-action#usage) in the README of the `docker/build-push-action` repository.
      # It uses the `tags` and `labels` parameters to tag and label the image with the output from the "meta" step.
      # - name: Set up QEMU
      #   uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push
        uses: docker/build-push-action@v6
        id: push
        with:
          add-hosts: postgres:${{ steps.postgres_ip.outputs.POSTGRES }}
          file: ./Dockerfile
          platforms: linux/amd64
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom : true
        env:
          SOURCE_DATE_EPOCH: 0

      # This step generates an artifact attestation for the image, which is an unforgeable statement about where and how it was built. It increases supply chain security for people who consume the image. For more information, see [Using artifact attestations to establish provenance for builds](/actions/security-guides/using-artifact-attestations-to-establish-provenance-for-builds).
      #- name: Generate artifact attestation
      #  uses: actions/attest-build-provenance@v2
      #  with:
      #    subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}
      #    subject-digest: ${{ steps.push.outputs.digest }}
      #    push-to-registry: true
